<!DOCTYPE html>
<html>
<head>
    <title>Jay Predictions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{font-family:Arial;background:#f4f4f4;margin:0}
        header{background:#1565c0;color:white;padding:15px;text-align:center}
        .card{background:white;margin:15px;padding:15px;border-radius:10px}
        .locked{background:#ddd;padding:10px;border-radius:5px;margin-top:10px}
        button{width:100%;padding:12px;background:green;color:white;border:none;border-radius:5px}
    </style>
</head>

<body>

<header>JAY PREDICTIONS</header>

<div class="card">
    <h3>Arsenal vs Chelsea</h3>
    <p>Kickoff: 18:00</p>

    <div id="lockedBox" class="locked">
    🔒 Prediction locked - Complete payment to unlock
</div>

    <button onclick="payNow()">Unlock for KES 50</button>
</div>
<script>
const backendURL = "https://jaypredictions.onrender.com";

async function payNow(){

    // STEP 1: Ask phone number
    const phone = prompt("Enter M-Pesa number (07XXXXXXXX)");

    if(!phone){
        alert("Phone number is required");
        return;
    }

    // STEP 2: Show loading message
    alert("Sending STK Push... Please wait");

    try {

        // STEP 3: Send request to backend
        const res = await fetch(backendURL + "/stkpush", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone })
        });

        const data = await res.json();

        if(data.success){

            alert("STK Push sent to your phone. Complete payment.");

            // STEP 4: Start checking payment
            checkPayment(data.reference);

        } else {
            alert("Failed to initiate payment");
        }

    } catch(error){
        alert("Error connecting to server");
        console.log(error);
    }
}

// STEP 5: Check payment status every 5 seconds
function checkPayment(ref){

    const interval = setInterval(async () => {

        try {

            const res = await fetch(backendURL + "/verify/" + ref);
            const data = await res.json();

            if(data.paid){

                clearInterval(interval);

                alert("Payment successful! Prediction unlocked.");

                // STEP 6: Reveal prediction
                document.getElementById("lockedBox").innerHTML = `
                    <h3>Prediction: Home Win</h3>
                    <p>Confidence: 87%</p>
                    <p>Over 1.5 Goals recommended</p>
                `;
            }

        } catch(err){
            console.log("Checking payment...");
        }

    }, 5000);
}
</script>
</body>
</html>
